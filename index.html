<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lu Sai Studio - Movies</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Tahoma,sans-serif}

    body{
      background:#03001C;
      color:#e2e8f0;
      transition:.3s;
    }

    body.light{
      background:#f1f5f9;
      color:#0f172a;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 40px;
      background:#111827;
      position:sticky;
      top:0;
      z-index:10;
    }

    header h1{color:#38bdf8;font-size:22px}

    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
    }

    #searchInput{
      padding:6px 10px;
      border-radius:6px;
      border:none;
      outline:none;
      width:160px;
    }

    .banner{
      position:relative;
      overflow:hidden;
      width:100%;
      aspect-ratio:25/9;
      margin-bottom:20px;
    }

    .banner-slides{
      display:flex;
      transition:transform .6s ease;
      height:100%;
    }

    .banner-item{
      min-width:100%;
      position:relative;
    }

    .banner-item img{
      width:100%;
      height:100%;
      object-fit:cover;
      filter:brightness(0.6);
    }

    .banner-text{
      position:absolute;
      bottom:20px;
      left:20px;
      color:white;
    }

    .movies{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:#1e293b;
      border-radius:12px;
      overflow:hidden;
      cursor:pointer;
    }

    .card img{
      width:100%;
      height:260px;
      object-fit:cover;
    }

    .card-content{
      padding:10px;
    }

    .detail{
      display:none;
      padding:20px;
    }

    .detail img{
      width:100%;
      border-radius:10px;
    }

    footer{
      text-align:center;
      padding:20px;
      background:#111827;
      color:white;
    }

  </style>
</head>

<body>

<header>
  <h1>Lu Sai Studio</h1>

  <div class="header-right">
    <input id="searchInput" placeholder="Search movies..." />
    <button id="themeToggle">🌙</button>
  </div>
</header>

<!-- BANNER -->
<div class="banner">
  <div class="banner-slides" id="bannerSlides"></div>
</div>

<!-- MOVIES -->
<section class="movies" id="movieGrid"></section>

<!-- DETAIL -->
<section class="detail" id="detail">
  <h2 id="dtitle"></h2>
  <p id="ddesc"></p>
  <img id="dimg"/>
  <br><br>
  <button onclick="goBack()">Back</button>
</section>

<footer>
  <marquee>Welcome 2026 🎬 Offline Movie System</marquee>
</footer>

<script>

let movies = [];
let editorChoice = [];
let bIndex = 0;

// =============================
// OFFLINE FILE LOADER (NO CORS)
// =============================
window.addEventListener("load", () => {

  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".txt,.json";
  input.style.display = "none";

  document.body.appendChild(input);

  input.addEventListener("change", (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = (event) => {
      try {
        movies = JSON.parse(event.target.result);

        editorChoice = movies.slice(0,5).map(m => ({
          t: m.t,
          img: m.imgs[0],
          d: m.d
        }));

        renderMovies();
        renderBanner();

      } catch (err) {
        alert("Invalid movie.txt JSON!");
        console.error(err);
      }
    };

    reader.readAsText(file);
  });

  // AUTO OPEN FILE PICKER
  input.click();
});

// =============================
// RENDER MOVIES
// =============================
function renderMovies(){
  const grid = document.getElementById("movieGrid");
  grid.innerHTML = "";

  movies.forEach((m,i)=>{
    grid.innerHTML += `
      <div class="card" onclick="openDetail(${i})">
        <img src="${m.imgs[0]}"/>
        <div class="card-content">
          <h3>${m.t}</h3>
          <p>${m.d}</p>
        </div>
      </div>
    `;
  });
}

// =============================
// BANNER
// =============================
function renderBanner(){
  const b = document.getElementById("bannerSlides");
  b.innerHTML = "";

  editorChoice.forEach(m=>{
    b.innerHTML += `
      <div class="banner-item">
        <img src="${m.img}">
        <div class="banner-text">
          <h2>${m.t}</h2>
          <p>${m.d}</p>
        </div>
      </div>
    `;
  });

  clearInterval(window.bannerTimer);

  window.bannerTimer = setInterval(()=>{
    if(editorChoice.length === 0) return;

    bIndex = (bIndex + 1) % editorChoice.length;
    b.style.transform = `translateX(-${bIndex*100}%)`;
  },4000);
}

// =============================
// DETAIL PAGE
// =============================
function openDetail(i){
  const m = movies[i];

  document.getElementById("movieGrid").style.display="none";
  document.querySelector(".banner").style.display="none";
  document.getElementById("detail").style.display="block";

  document.getElementById("dtitle").innerText = m.t;
  document.getElementById("ddesc").innerText = m.d;
  document.getElementById("dimg").src = m.imgs[0];
}

function goBack(){
  document.getElementById("movieGrid").style.display="grid";
  document.querySelector(".banner").style.display="block";
  document.getElementById("detail").style.display="none";
}

// =============================
// SEARCH
// =============================
document.getElementById("searchInput").addEventListener("input",(e)=>{
  const q = e.target.value.toLowerCase();

  document.querySelectorAll(".card").forEach(card=>{
    const title = card.querySelector("h3").innerText.toLowerCase();
    card.style.display = title.includes(q) ? "block" : "none";
  });
});

// =============================
// THEME
// =============================
document.getElementById("themeToggle").onclick = () => {
  document.body.classList.toggle("light");
};

</script>

</body>
</html>
