<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lu Sai Studio - Movies</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Tahoma,sans-serif}

body{background:#03001C;color:#e2e8f0;transition:.3s}
body.light{background:#f1f5f9;color:#0f172a}

/* HEADER */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 40px;background:#111827;position:sticky;top:0;z-index:10;
}
header h1{color:#38bdf8;font-size:22px}
.header-right{display:flex;gap:10px}
#searchInput{padding:6px 10px;border-radius:6px;border:none;outline:none}

/* MOVIES */
.movies{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;padding:20px;
}
.card{background:#1e293b;border-radius:12px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:260px;object-fit:cover}
.card-content{padding:10px}

/* DETAIL */
.detail{display:none;padding:20px}

/* BACK BUTTON */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  z-index:20;
  background:rgba(0,0,0,0.6);
  border:none;
  color:white;
  font-size:20px;
  padding:10px 14px;
  border-radius:50%;
  cursor:pointer;
  backdrop-filter:blur(6px);
}

/* HERO 21:9 */
.hero{
  position:relative;
  width:100%;
  aspect-ratio:21/9;
  overflow:hidden;
  border-radius:12px;
}
.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.6);
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}
.hero-overlay{
  position:absolute;
  bottom:20px;
  left:20px;
  color:white;
}
.hero-overlay h2{
  font-size:32px;
}

/* DESCRIPTION */
.detail-content{
  text-align:center;
  margin-top:20px;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
}
.detail-content p{
  font-size:18px;
  line-height:1.6;
}

/* HIDE TOOLBAR IN DETAIL MODE */
body.detail-mode header{
  display:none;
}

footer{
  text-align:center;
  padding:20px;
  background:#111827;
  color:white;
}
</style>
</head>

<body>

<header>
  <h1>Lu Sai Studio</h1>
  <div class="header-right">
    <input id="searchInput" placeholder="Search movies..."/>
    <button id="themeToggle">🌙</button>
  </div>
</header>

<!-- MOVIES -->
<section class="movies" id="movieGrid"></section>

<!-- DETAIL -->
<section class="detail" id="detail">

  <!-- BACK BUTTON -->
  <button class="back-btn" onclick="goBack()">⬅</button>

  <div class="hero">
    <img id="dimg"/>
    <div class="hero-overlay">
      <h2 id="dtitle"></h2>
    </div>
  </div>

  <div class="detail-content">
    <p id="ddesc"></p>
  </div>

</section>

<footer>
  <marquee>Welcome 2026 🎬 Offline Movie System</marquee>
</footer>

<script src="movie.js"></script>

<script>

// RENDER MOVIES
function renderMovies(){
  const grid = document.getElementById("movieGrid");
  grid.innerHTML = "";

  movies.forEach((m,i)=>{
    grid.innerHTML += `
      <div class="card" onclick="openDetail(${i})">
        <img src="${m.imgs[0]}"/>
        <div class="card-content">
          <h3>${m.t}</h3>
          <p>${m.d}</p>
        </div>
      </div>
    `;
  });
}

renderMovies();

// OPEN DETAIL
function openDetail(i){
  const m = movies[i];

  document.body.classList.add("detail-mode");

  movieGrid.style.display = "none";
  detail.style.display = "block";

  dtitle.innerText = m.t;
  ddesc.innerText = m.d;
  dimg.src = m.imgs[0];
}

// BACK BUTTON
function goBack(){
  document.body.classList.remove("detail-mode");

  movieGrid.style.display = "grid";
  detail.style.display = "none";
}

// SEARCH
searchInput.addEventListener("input",(e)=>{
  const q = e.target.value.toLowerCase();

  document.querySelectorAll(".card").forEach(card=>{
    const title = card.querySelector("h3").innerText.toLowerCase();
    card.style.display = title.includes(q) ? "block" : "none";
  });
});

// THEME
themeToggle.onclick = () => {
  document.body.classList.toggle("light");
};

</script>

</body>
</html>
