<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lu Sai Studio</title>

<style>

body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#FFFDEB;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  height:65px;
  display:flex;
  align-items:center;
  padding:0 40px;
  background:#000000;
  color:white;
  z-index:1000;
}

body{ padding-top:65px; }

/* ================= HERO ================= */
.hero{
  position:relative;
  width:100%;
  aspect-ratio:21/9;
  overflow:hidden;
  background:#000;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:1;
  transform:scale(1.02);
  transition: opacity 0.6s ease, transform 6s ease;
}

.fade-out{
  opacity:0;
}

.hero-content{
  position:absolute;
  left:60px;
  bottom:80px;
  z-index:2;
}

.hero-content h1{
  color:white;
  font-size:42px;
  margin:0;
}

.hero-content p{
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(12px);
  padding:12px;
  border-radius:12px;
  color:white;
  max-width:420px;
}

/* ARROWS */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:22px;
  background:rgba(0,0,0,0.5);
  color:white;
  z-index:10;
  transition:0.25s ease;
}

.arrow:hover{
  background:#DA4848;
  transform:translateY(-50%) scale(1.1);
}

.left{ left:15px; }
.right{ right:15px; }

/* ================= TRENDING ================= */
.section{
  padding:40px;
}

.stagger{
  column-count:4;
  column-gap:30px;
}

.card{
  display:inline-block;
  width:100%;
  margin-bottom:30px;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  border-radius:16px;
  overflow:hidden;

  transition:0.25s ease;
}

.card:hover{
  transform:scale(1.04);
}

.card img{
  width:100%;
  display:block;
}

.card-body{
  padding:12px;
}

.card-body h4{
  margin:0;
  color:#DA4848;
}

.card-body p{
  font-size:13px;
  opacity:0.9;
}

/* RESPONSIVE */
@media(max-width:1200px){ .stagger{column-count:3;} }
@media(max-width:800px){ .stagger{column-count:2;} }
@media(max-width:500px){ .stagger{column-count:1;} }

/* MOBILE BANNER */
@media (max-width:768px){
  .hero{ aspect-ratio:2/3; }

  .hero-content h1{ font-size:20px; }

  .hero-content p{
    font-size:12px;
    max-width:90%;
  }
}

/* ================= FOOTER ================= */
footer{
  background:#2f2f2f;
  color:white;
  text-align:center;
  padding:25px 15px;
  margin-top:40px;
}

footer a{
  color:#ffcc70;
  text-decoration:none;
}

footer a:hover{
  text-decoration:underline;
}

</style>
</head>

<body>

<header>
  <img src="home.png" width="50px" height="50px"/>
  <h1>LU SAI STUDIO</h1>
</header>

<div class="hero">
  <button class="arrow left" onclick="prevSlide()">❮</button>
  <button class="arrow right" onclick="nextSlide()">❯</button>

  <img id="heroImg"/>

  <div class="hero-content">
    <h1 id="heroTitle"></h1>
    <p id="heroDesc"></p>
  </div>
</div>

<div class="section">
  <h2>🔥 Trending Now</h2>
  <div class="stagger" id="row"></div>
</div>

<!-- FOOTER -->
<footer>
  <p>Contact Us: 
    <a href="mailto:waiyanmin.wmcomics@gmail.com">
      waiyanmin.wmcomics@gmail.com
    </a>
  </p>
</footer>

<script src="banner.js"></script>
<script src="movie.js"></script>

<script>

let index = 0;
let timer;

function preload(src){
  const img = new Image();
  img.src = src;
}

function loadSlide(i){
  const hero = document.getElementById("heroImg");

  hero.classList.add("fade-out");

  setTimeout(()=>{
    const b = banners[i];

    preload(banners[(i+1)%banners.length].image);

    hero.src = b.image;
    heroTitle.innerText = b.title;
    heroDesc.innerText = b.desc;

    hero.classList.remove("fade-out");

    index = i;
  },300);
}

function nextSlide(){
  loadSlide((index + 1) % banners.length);
  resetAuto();
}

function prevSlide(){
  loadSlide((index - 1 + banners.length) % banners.length);
  resetAuto();
}

function startAuto(){
  timer = setInterval(nextSlide, 5000);
}

function resetAuto(){
  clearInterval(timer);
  startAuto();
}

function renderMovies(list){
  const row = document.getElementById("row");
  row.innerHTML = "";

  list.forEach(m=>{
    row.innerHTML += `
      <div class="card">
        <img src="${m.imgs[0]}"/>
        <div class="card-body">
          <h4>${m.t}</h4>
          <p>${m.d}</p>
        </div>
      </div>
    `;
  });
}

window.onload = function(){
  loadSlide(0);
  renderMovies(movies);
  startAuto();
};

</script>

</body>
</html>
