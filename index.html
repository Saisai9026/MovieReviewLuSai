<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lu Sai Studio</title>

<style>

body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#FFFDEB;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  height:65px;
  display:flex;
  align-items:center;
  padding:0 40px;
  background:#DA4848;
  color:white;
  z-index:1000;
}

body{ padding-top:65px; }

/* ================= HERO (DESKTOP 21:9) ================= */
.hero{
  position:relative;
  width:100%;
  aspect-ratio:21/9;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.hero-content{
  position:absolute;
  left:60px;
  bottom:80px;
}

.hero-content h1{
  color:white;
  font-size:42px;
}

.hero-content p{
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  padding:12px;
  border-radius:12px;
  color:white;
  max-width:420px;
}

/* ================= ARROWS ================= */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:22px;
  background:rgba(0,0,0,0.4);
  color:white;
  z-index:10;
}

.left{ left:15px; }
.right{ right:15px; }

/* ================= MOBILE 2:3 FIX ================= */
@media (max-width:768px){

  .hero{
    aspect-ratio:2/3;   /* 🔥 MOBILE PORTRAIT */
  }

  .hero-content{
    left:15px;
    bottom:20px;
  }

  .hero-content h1{
    font-size:20px;
  }

  .hero-content p{
    font-size:12px;
    max-width:90%;
  }

  .arrow{
    width:45px;
    height:45px;
    font-size:18px;
  }
}

/* ================= TRENDING ================= */
.section{
  padding:40px;
}

.stagger{
  column-count:4;
  column-gap:30px;
}

/* GLASS CARD */
.card{
  display:inline-block;
  width:100%;
  margin-bottom:30px;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  border-radius:16px;

  overflow:hidden;
}

.card img{
  width:100%;
}

.card-body{
  padding:12px;
}

.card-body h4{
  color:#DA4848;
  margin:0;
}

.card-body p{
  font-size:13px;
  opacity:0.9;
}

/* RESPONSIVE GRID */
@media(max-width:1200px){ .stagger{column-count:3;} }
@media(max-width:800px){ .stagger{column-count:2;} }
@media(max-width:500px){ .stagger{column-count:1;} }

</style>
</head>

<body>

<header>
  <h1>LU SAI STUDIO</h1>
</header>

<!-- HERO -->
<div class="hero">

  <button class="arrow left" onclick="prevSlide()">❮</button>
  <button class="arrow right" onclick="nextSlide()">❯</button>

  <img id="heroImg"/>

  <div class="hero-content">
    <h1 id="heroTitle"></h1>
    <p id="heroDesc"></p>
  </div>

</div>

<!-- TRENDING -->
<div class="section">
  <h2>🔥 Trending Now</h2>
  <div class="stagger" id="row"></div>
</div>

<script src="banner.js"></script>
<script src="movie.js"></script>

<script>

let index = 0;

function loadSlide(i){
  const b = banners[i];

  heroImg.src = b.image;
  heroTitle.innerText = b.title;
  heroDesc.innerText = b.desc;

  index = i;
}

function nextSlide(){
  loadSlide((index + 1) % banners.length);
}

function prevSlide(){
  loadSlide((index - 1 + banners.length) % banners.length);
}

function renderMovies(list){
  const row = document.getElementById("row");
  row.innerHTML = "";

  list.forEach(m=>{
    row.innerHTML += `
      <div class="card">
        <img src="${m.imgs[0]}"/>
        <div class="card-body">
          <h4>${m.t}</h4>
          <p>${m.d}</p>
        </div>
      </div>
    `;
  });
}

window.onload = function(){
  loadSlide(0);
  renderMovies(movies);
};

</script>

</body>
</html>
