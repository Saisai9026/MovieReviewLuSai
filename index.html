<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lu Sai Studio - Movies</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Tahoma,sans-serif}

    body{
      background:#03001C;
      color:#e2e8f0;
      transition:.3s;
    }

    body.light{
      background:#f1f5f9;
      color:#0f172a;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 40px;
      background:#111827;
      position:sticky;
      top:0;
      z-index:10;
    }

    body.light header{background:#fff}

    header h1{color:#38bdf8;font-size:22px}

    .header-right{display:flex;align-items:center;gap:10px}

    .header-right a{
      color:#38bdf8;
      text-decoration:none;
      font-weight:500;
    }

    #searchInput{
      padding:6px 10px;
      border-radius:6px;
      border:none;
      outline:none;
      width:160px;
    }

    /* HERO EDITOR CHOICE */
    .banner{
      position:relative;
      overflow:hidden;
      width:100%;
      aspect-ratio:25/9;
      margin:0 0 20px 0;
      border-radius:0;
    }

    .banner-slides{
      display:flex;
      transition:transform .6s ease;
      height:100%;
    }

    .banner-item{
      min-width:100%;
      position:relative;
    }

    .banner-item img{
      width:100%;
      height:100%;
      aspect-ratio:25/9;
      object-fit:cover;
      filter:brightness(0.6);
    }

    .banner-text{
      position:absolute;
      bottom:20px;
      left:20px;
      right:20px;
      color:white;
    }

    .banner-text h2{
  margin-bottom:6px;
  font-size:32px;
  font-weight:700;
  letter-spacing:0.5px;
}

.banner-text p{
  width:50%;
}

    .hero{
      text-align:center;
      padding:20px;
    }

    .movies{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:40px;
    }

    .card{
      background:#1e293b;
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
      transition:.3s;
      opacity:1;
      transform:scale(1);
    }

    body.light .card{
      background:#fff;
      box-shadow:0 10px 20px rgba(0,0,0,.08);
    }

    .card:hover{transform:translateY(-6px)}

    .slider{position:relative;height:260px;overflow:hidden}

    .slides{display:flex;transition:transform .4s ease;height:100%}

    .slides img{width:100%;height:260px;object-fit:cover;flex-shrink:0}

    .card-content{padding:14px}
    .card-content h3{margin-bottom:6px}
    .card-content p{color:#94a3b8;line-height:1.5}

    footer{text-align:center;padding:20px;background:#111827}
    body.light footer{background:#fff}

    .detail{display:none;padding:40px}

    .detail-slider{position:relative;overflow:hidden;border-radius:12px}

    .detail-slides{display:flex;transition:transform .5s ease}

    .detail-slides img{width:100%;aspect-ratio:21/9;object-fit:cover}

    .detail-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:#fff;border:none;padding:6px 10px;border-radius:6px}

    .back{color:#38bdf8;cursor:pointer;margin-bottom:20px;display:inline-block}
  </style>
</head>

<body>

<header>
  <h1>Lu Sai Studio</h1>
  <div class="header-right">
    <input id="searchInput" placeholder="Search movies..." />
    <a href="#contact">Contact</a>
    <button id="themeToggle" style="background:none;border:none;font-size:20px;cursor:pointer;color:#38bdf8">🌙</button>
  </div>
</header>

<section id="home">

  <!-- EDITOR CHOICE BANNER -->
  
  <div class="banner">
    <div class="banner-slides" id="bannerSlides"></div>
  </div>

  <div class="hero">
    <h2>Movie Collection</h2>
  </div>

  <section class="movies" id="movieGrid"></section>
</section>

<section class="detail" id="detail">
  <span class="back" onclick="goBack()">← Back</span>

  <div class="detail-slider">
    <div class="detail-slides" id="detailSlides"></div>
    <button class="detail-arrow" style="left:10px" onclick="prevDetail()">◀</button>
    <button class="detail-arrow" style="right:10px" onclick="nextDetail()">▶</button>
  </div>

  <h2 id="dtitle" style="margin-top:15px"></h2>
  <p id="ddesc"></p>
  <div style="margin-top:15px">
    <iframe width="150" height="200" src="https://www.youtube.com/embed/6iFMkiQcJ_0?list=RD6iFMkiQcJ_0&start_radio=1" frameborder="0" allowfullscreen style="border-radius:12px"></iframe>
  </div>
</section>

<footer>
  <marquee>Welcome 2026 Thingyan - ကြိုဆိုပါတယ် သင်္ကြန် ၂၀၂၆ 🎉</marquee>
</footer>

<script>

// MOVIES
const movies = [
  {t:"The Dark Knight",imgs:["https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg"],d:"Batman နဲ့ Joker တိုက်ပွဲဇာတ်လမ်း"},
  {t:"Inception",imgs:["https://image.tmdb.org/t/p/w500/9O7gLzmreU0nGkIB6K3BsJbzvNv.jpg"],d:"အိမ်မက်အလွှာဇာတ်ကား"},
  {t:"Interstellar",imgs:["https://image.tmdb.org/t/p/w500/6aNKD81RHR1DqUUa8kOZ1TBY1Lp.jpg"],d:"အာကာသခရီးစဉ်"},
  {t:"Avatar",imgs:["https://image.tmdb.org/t/p/w500/jRXYjXNq0Cs2TcJjLkki24MLp7u.jpg"],d:"Pandora စွန့်စားခန်း"},
  {t:"Titanic",imgs:["https://image.tmdb.org/t/p/w500/9xjZS2rlVxm8SFx8kPC3aIGCOYQ.jpg"],d:"အချစ်ဇာတ်လမ်း"}
];

// EDITOR CHOICE
const editorChoice = [
  {t:"Interstellar",img:"https://image.tmdb.org/t/p/w500/6aNKD81RHR1DqUUa8kOZ1TBY1Lp.jpg",d:"ဒေါက်တာကူးပါနဲ့ အာကာသထဲကို ခရီးသွားပြီး လူသားမျိုးနွယ်ကို ကယ်တင်ဖို့ ကြိုးစားတဲ့ အလွန်စိတ်လှုပ်ရှားဖွယ် သိပ္ပံစိတ်ကူးယဉ်ဇာတ်ကားတစ်ကား ဖြစ်ပါတယ်။"},
  {t:"Inception",img:"https://image.tmdb.org/t/p/w500/9O7gLzmreU0nGkIB6K3BsJbzvNv.jpg",d:"အိမ်မက်အလွှာတွေထဲဝင်ပြီး လူတစ်ယောက်ရဲ့အတွေးကို ထိန်းချုပ်ခြင်း၊ ခိုးယူခြင်းတို့ကို လုပ်ဆောင်တဲ့ အလွန်ရှုပ်ထွေးပြီး စိတ်ဝင်စားဖွယ်ဇာတ်လမ်းဖြစ်ပါတယ်။"},
  {t:"The Dark Knight",img:"https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg",d:"Batman နဲ့ Joker တို့အကြား Gotham မြို့ကို ကာကွယ်ဖို့အတွက် စိတ်ပိုင်းဆိုင်ရာ၊ ကိုယ်ခန္ဓာပိုင်းဆိုင်ရာ တိုက်ပွဲတွေပြင်းထန်စွာဖြစ်ပွားတဲ့ ဒဏ္ဍာရီဆန်ဆန် superhero ဇာတ်ကားဖြစ်ပါတယ်။"},
  {t:"Avatar",img:"https://image.tmdb.org/t/p/w500/jRXYjXNq0Cs2TcJjLkki24MLp7u.jpg",d:"Pandora ဂြိုဟ်ပေါ်မှာ လူသားတွေနဲ့ Na’vi လူမျိုးတို့အကြား သဘာဝ၊ ယဉ်ကျေးမှုနဲ့ စစ်ပွဲတွေကို အခြေခံထားတဲ့ အလွန်လှပတဲ့ sci-fi ဇာတ်ကားဖြစ်ပါတယ်။"},
  {t:"Titanic",img:"https://image.tmdb.org/t/p/w500/9xjZS2rlVxm8SFx8kPC3aIGCOYQ.jpg",d:"Titanic သင်္ဘောပေါ်မှာ ဖြစ်ပွားခဲ့တဲ့ အချစ်ဇာတ်လမ်းနဲ့ သမိုင်းဝင် အဖြစ်အပျက်ကြီးကို အခြေခံထားတဲ့ အလွန်ထိမိစရာဇာတ်ကားဖြစ်ပါတယ်။"}
];

const grid=document.getElementById("movieGrid");

function renderMovies(){
  grid.innerHTML="";
  movies.forEach((m,i)=>{
    grid.innerHTML+=`
    <div class="card" onclick="openDetail(${i})">
      <div class="slider"><div class="slides"><img src="${m.imgs[0]}"></div></div>
      <div class="card-content">
        <h3>${m.t}</h3>
        <p>${m.d}</p>
      </div>
    </div>`;
  });
}

// BANNER
let bIndex=0;
function renderBanner(){
  const b=document.getElementById("bannerSlides");
  editorChoice.forEach(m=>{
    b.innerHTML+=`
      <div class="banner-item">
        <img src="${m.img}">
        <div class="banner-text">
          <h2>${m.t}</h2>
          <p>${m.d}</p>
        </div>
      </div>`;
  });

  setInterval(()=>{
    const slides=b;
    bIndex=(bIndex+1)%editorChoice.length;
    slides.style.transform=`translateX(-${bIndex*100}%)`;
  },4000);
}

renderMovies();
renderBanner();

// SEARCH
const searchInput=document.getElementById("searchInput");
searchInput.addEventListener("input",()=>{
  const q=searchInput.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    const title=card.querySelector("h3").innerText.toLowerCase();
    const match=title.includes(q);
    card.style.display=match?"block":"none";
  });
});

// DETAIL
let currentMovie=null;
let dIndex=0;

function openDetail(i){
  currentMovie=movies[i];
  document.getElementById("home").style.display="none";
  document.getElementById("detail").style.display="block";
  document.getElementById("dtitle").innerText=currentMovie.t;
  document.getElementById("ddesc").innerText=currentMovie.d;

  const c=document.getElementById("detailSlides");
  c.innerHTML=`<img src="${currentMovie.imgs[0]}">`;
  dIndex=0;
}

function nextDetail(){updateDetail(1)}
function prevDetail(){updateDetail(-1)}
function updateDetail(dir){
  dIndex=0;
  document.getElementById("detailSlides").style.transform=`translateX(0)`;
}

function goBack(){
  document.getElementById("home").style.display="block";
  document.getElementById("detail").style.display="none";
}

// THEME
window.addEventListener("DOMContentLoaded",()=>{
  const btn=document.getElementById("themeToggle");
  if(btn){
    btn.onclick=()=>{
      document.body.classList.toggle("light");
      btn.textContent=document.body.classList.contains("light")?"☀️":"🌙";
    };
  }
});

</script>

</body>
</html>
